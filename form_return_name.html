<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Return first and last name from a form</title>
</head>
<body>
  <form id="form1" onsubmit="return getFormValue()">
    First name: <input type="text" name="fname" value="David"><br>
    Last name: <input type="text" name="lname" value="Beckham"><br>
    <input type="submit" value="Submit">
  </form>

  <p id="result"></p>

  <script>
    function getFormValue() {
      var form = document.getElementById('form1');
      var fname = form.elements['fname'].value;
      var lname = form.elements['lname'].value;
      document.getElementById('result').textContent = 'First name: ' + fname + ', Last name: ' + lname;
      return false;
    }
  </script>
</body>
</html>
